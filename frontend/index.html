<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Language Translation Tool - Decoupled client-side application interfacing with FastAPI.">
    <title>Language Translation Tool</title>
    <!-- Google Fonts: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header class="app-header">
        <div class="container header-container">
            <h1 class="app-title">Language Translation Tool</h1>
            <p class="app-subtitle">Translate text between 100+ languages instantly using Google Cloud Translation.</p>
        </div>
    </header>

    <main class="app-content">
        <div class="container">
            <!-- Main UI Panel Card -->
            <div class="translation-card">
                <!-- Toolbar for selectors and controls -->
                <div class="translation-toolbar">
                    <div class="dropdown-wrapper" id="source-dropdown-wrapper">
                        <label for="source-lang-select" class="sr-only">From Language</label>
                        <select id="source-lang-select" class="lang-select" style="display: none;">
                            <option value="auto">Detect Language</option>
                            <option value="en">English</option>
                            <option value="es">Spanish</option>
                            <option value="fr">French</option>
                        </select>
                        <div class="custom-dropdown" id="source-custom-dropdown">
                            <button type="button" class="dropdown-trigger" id="source-dropdown-trigger" aria-haspopup="listbox" aria-expanded="false">
                                <span class="selected-text">Detect Language</span>
                                <svg class="chevron-icon" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                    <polyline points="6 9 12 15 18 9"></polyline>
                                </svg>
                            </button>
                            <div class="dropdown-menu" role="listbox">
                                <div class="dropdown-search-wrapper">
                                    <svg class="search-icon" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                        <circle cx="11" cy="11" r="8"></circle>
                                        <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                                    </svg>
                                    <input type="text" class="dropdown-search-input" placeholder="Search language..." aria-label="Search language">
                                </div>
                                <ul class="dropdown-options" role="listbox" tabindex="-1">
                                    <!-- Options will be populated dynamically -->
                                </ul>
                            </div>
                        </div>
                    </div>

                    <button id="swap-languages-btn" class="icon-btn" aria-label="Swap source and target languages" type="button">
                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="m16 3 4 4-4 4"></path>
                            <path d="M20 7H4"></path>
                            <path d="m8 21-4-4 4-4"></path>
                            <path d="M4 17h16"></path>
                        </svg>
                    </button>

                    <div class="dropdown-wrapper" id="target-dropdown-wrapper">
                        <label for="target-lang-select" class="sr-only">To Language</label>
                        <select id="target-lang-select" class="lang-select" style="display: none;">
                            <option value="es">Spanish</option>
                            <option value="en">English</option>
                            <option value="fr">French</option>
                        </select>
                        <div class="custom-dropdown" id="target-custom-dropdown">
                            <button type="button" class="dropdown-trigger" id="target-dropdown-trigger" aria-haspopup="listbox" aria-expanded="false">
                                <span class="selected-text">Spanish</span>
                                <svg class="chevron-icon" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                    <polyline points="6 9 12 15 18 9"></polyline>
                                </svg>
                            </button>
                            <div class="dropdown-menu" role="listbox">
                                <div class="dropdown-search-wrapper">
                                    <svg class="search-icon" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                        <circle cx="11" cy="11" r="8"></circle>
                                        <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                                    </svg>
                                    <input type="text" class="dropdown-search-input" placeholder="Search language..." aria-label="Search language">
                                </div>
                                <ul class="dropdown-options" role="listbox" tabindex="-1">
                                    <!-- Options will be populated dynamically -->
                                </ul>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Text Panels Grid -->
                <div class="translation-grid">
                    <!-- Source Text Input -->
                    <div class="text-panel-wrapper source-panel">
                        <label for="source-textarea" class="panel-label">Source Text</label>
                        <textarea id="source-textarea" class="text-panel-textarea" placeholder="Enter text to translate..." maxlength="5000" autofocus></textarea>
                        <div class="panel-footer">
                            <span id="char-counter" class="char-count">0 / 5000</span>
                        </div>
                    </div>

                    <!-- Target Text Output -->
                    <div class="text-panel-wrapper target-panel">
                        <label for="target-textarea" class="panel-label">Translation Output</label>
                        <textarea id="target-textarea" class="text-panel-textarea readonly-textarea" placeholder="Translation will appear here..." readonly></textarea>
                        <div class="panel-footer">
                            <button id="copy-btn" class="btn btn-secondary" disabled type="button">
                                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                    <rect width="14" height="14" x="8" y="8" rx="2" ry="2"></rect>
                                    <path d="M4 16c-1.1 0-2-.9-2-2V4c0-1.1.9-2 2-2h10c1.1 0 2 .9 2 2"></path>
                                </svg>
                                Copy
                            </button>
                        </div>
                    </div>
                </div>

                <!-- Action Button Block -->
                <div class="translation-actions">
                    <button id="translate-btn" class="btn btn-primary" type="button">
                        Translate
                    </button>
                </div>
            </div>
        </div>
    </main>

    <footer class="app-footer">
        <div class="container">
            <p>Designed & Developed by Jay</p>
        </div>
    </footer>

    <!-- Frontend client application script -->
    <script type="module" src="js/app.js"></script>
</body>
</html>
